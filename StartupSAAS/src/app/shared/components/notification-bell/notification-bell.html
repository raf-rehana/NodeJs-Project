<a [routerLink]="viewAllLink()" class="position-relative d-flex align-items-center justify-content-center text-dark hover-text-primary transition-all p-2 rounded-circle hover-bg-light cursor-pointer" style="width: 40px; height: 40px; text-decoration: none;">
  <i class="bi bi-bell-fill fs-5" [ngClass]="iconClass"></i>
  @if (unreadCount() > 0) {
    <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger border border-2 border-white" style="font-size: 0.65rem; padding: 0.35em 0.5em;">
      {{ unreadCount() > 99 ? '99+' : unreadCount() }}
      <span class="visually-hidden">unread messages</span>
    </span>
  }
</a>
